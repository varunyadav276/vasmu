<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bonk Time 💜</title>
    <style>
        :root {
            --bg-color: #f3e5f5; 
            --primary-purple: #7b1fa2;
            --bonk-red: #ff1744;
        }

        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background-color: var(--bg-color);
            font-family: 'Comic Sans MS', 'Chalkboard SE', cursive;
            overflow: hidden;
            text-align: center;
        }

        h1 {
            color: var(--primary-purple);
            font-size: 1.8rem;
            margin-bottom: 5px;
            padding: 0 10px;
        }

        .emoji-header {
            font-size: 3rem;
            margin-bottom: 20px;
        }

        .stage {
            position: relative;
            width: 100%;
            max-width: 400px;
            height: 350px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Varun's Photo - Scaled Down */
        #target-face {
            width: 140px; /* Reduced from 200px */
            height: 140px;
            border-radius: 50%;
            object-fit: cover;
            border: 5px solid white;
            box-shadow: 0 8px 15px rgba(0,0,0,0.1);
            transition: transform 0.1s;
            z-index: 1;
        }

        /* Her Avatar - Scaled Up for Mobile */
        #gf-bat {
            position: absolute;
            width: 250px; /* Increased for that 'boss' energy */
            top: -10px;
            right: 0px;
            z-index: 10;
            pointer-events: none;
            transform-origin: bottom center;
            transition: transform 0.05s ease;
        }

        /* BONK Text Effect */
        #bonk-effect {
            position: absolute;
            top: 20px;
            font-size: 4.5rem;
            font-weight: 900;
            color: #ffff00;
            -webkit-text-stroke: 2px var(--bonk-red);
            text-shadow: 4px 4px 0px var(--bonk-red);
            opacity: 0;
            z-index: 20;
            pointer-events: none;
        }

        @keyframes pop {
            0% { transform: scale(0) rotate(-20deg); opacity: 0; }
            50% { transform: scale(1.4) rotate(10deg); opacity: 1; }
            100% { transform: scale(1.1) rotate(-5deg); opacity: 0; }
        }

        .bonk-animate {
            animation: pop 0.4s ease-out forwards;
        }

        /* UI */
        .btn-container {
            margin-top: 30px;
        }

        #bonk-btn {
            background-color: #6a1b9a;
            color: white;
            border: none;
            padding: 18px 50px;
            font-size: 1.4rem;
            font-weight: bold;
            border-radius: 40px;
            cursor: pointer;
            box-shadow: 0 6px #4a148c;
            text-transform: uppercase;
        }

        #bonk-btn:active {
            box-shadow: 0 2px #4a148c;
            transform: translateY(4px);
        }

        .sorry-text {
            margin-top: 20px;
            color: #7b1fa2;
            font-size: 0.9rem;
            font-style: italic;
            max-width: 80%;
        }
    </style>
</head>
<body>

    <h1>I'm sorry! I was being stupid.</h1>
    <div class="emoji-header">🥺</div>
    
    <div class="stage">
        <div id="bonk-effect">BONK!</div>
        <img id="target-face" src="me.png" alt="Varun">
        <img id="gf-bat" src="gf-hold.png" alt="Her">
    </div>

    <div class="btn-container">
        <button id="bonk-btn" onclick="executeBonk()">PRESS TO BONK</button>
    </div>

    <p class="sorry-text">Click the button to get your revenge. I'll take it like a champ.</p>

    <script>
        const audio = new Audio('bonk.mp3');
        const batImg = document.getElementById('gf-bat');
        const myFace = document.getElementById('target-face');
        const bonkText = document.getElementById('bonk-effect');

        function executeBonk() {
            // 1. Sound
            audio.currentTime = 0;
            audio.play();

            // 2. Switch to "Hit" visuals
            batImg.src = 'gf-hit.png';
            myFace.src = 'me-cry.png'; // Swap to cry face
            
            // 3. Transform animations
            batImg.style.transform = 'translate(-120px, 100px) rotate(-50deg)';
            myFace.style.transform = 'rotate(25deg) scaleY(0.7) translateY(40px)';

            // 4. Text Effect
            bonkText.classList.remove('bonk-animate');
            void bonkText.offsetWidth; 
            bonkText.classList.add('bonk-animate');

            // 5. Reset after hit
            setTimeout(() => {
                batImg.src = 'gf-hold.png';
                myFace.src = 'me.png'; // Back to normal face
                batImg.style.transform = 'translate(0, 0) rotate(0deg)';
                myFace.style.transform = 'rotate(0deg) scaleY(1) translateY(0)';
            }, 350);
        }
    </script>
</body>
</html>
