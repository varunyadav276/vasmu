<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bonk Time 💜</title>
    <style>
        :root {
            --bg-color: #f3e5f5; 
            --primary-purple: #7b1fa2;
            --bonk-red: #ff1744;
        }

        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background-color: var(--bg-color);
            font-family: 'Comic Sans MS', 'Chalkboard SE', cursive;
            overflow: hidden;
            text-align: center;
        }

        h1 {
            color: var(--primary-purple);
            font-size: 1.6rem;
            margin-bottom: 5px;
            padding: 0 15px;
        }

        .emoji-header {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        /* Container that holds both of you */
        .stage {
            position: relative;
            width: 100%;
            height: 320px; /* Adjusted height */
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Your Photo */
        #target-face {
            width: 130px; 
            height: 130px;
            border-radius: 50%;
            object-fit: cover;
            border: 5px solid white;
            box-shadow: 0 8px 15px rgba(0,0,0,0.1);
            z-index: 1;
            transition: transform 0.1s;
            margin-top: 50px; /* Pushes head down slightly */
        }

        /* Her Avatar - Anchored to center with offset */
        #gf-bat {
            position: absolute;
            width: 240px; 
            z-index: 10;
            pointer-events: none;
            
            /* Positioning logic: Start at center, then nudge right */
            left: 50%;
            bottom: 120px; /* Adjust this to move her up/down */
            transform: translateX(10px); /* Adjust this to move her closer/further */
            
            transform-origin: bottom center;
            transition: transform 0.08s cubic-bezier(0.18, 0.89, 0.32, 1.28);
        }

        /* BONK Text */
        #bonk-effect {
            position: absolute;
            top: 10%;
            font-size: 4rem;
            font-weight: 900;
            color: #ffff00;
            -webkit-text-stroke: 2px var(--bonk-red);
            text-shadow: 4px 4px 0px var(--bonk-red);
            opacity: 0;
            z-index: 20;
            pointer-events: none;
        }

        @keyframes pop {
            0% { transform: scale(0) rotate(-20deg); opacity: 0; }
            50% { transform: scale(1.3) rotate(10deg); opacity: 1; }
            100% { transform: scale(1.1) rotate(-5deg); opacity: 0; }
        }

        .bonk-animate {
            animation: pop 0.4s ease-out forwards;
        }

        /* Button */
        .btn-container {
            margin-top: 20px;
        }

        #bonk-btn {
            background-color: #6a1b9a;
            color: white;
            border: none;
            padding: 18px 50px;
            font-size: 1.3rem;
            font-weight: bold;
            border-radius: 40px;
            cursor: pointer;
            box-shadow: 0 6px #4a148c;
        }

        #bonk-btn:active {
            box-shadow: 0 2px #4a148c;
            transform: translateY(4px);
        }

        .sorry-text {
            margin-top: 15px;
            color: #7b1fa2;
            font-size: 0.85rem;
            padding: 0 20px;
        }
    </style>
</head>
<body>

    <h1>I'm sorry! I was being stupid.</h1>
    <div class="emoji-header">🥺</div>
    
    <div class="stage">
        <div id="bonk-effect">BONK!</div>
        <img id="target-face" src="me.png" alt="Varun">
        <img id="gf-bat" src="gf-hold.png" alt="Her">
    </div>

    <div class="btn-container">
        <button id="bonk-btn" onclick="executeBonk()">PRESS TO BONK</button>
    </div>

    <p class="sorry-text">I'll take it like a champ.</p>

    <script>
        const audio = new Audio('bonk.mp3');
        const batImg = document.getElementById('gf-bat');
        const myFace = document.getElementById('target-face');
        const bonkText = document.getElementById('bonk-effect');

        function executeBonk() {
            audio.currentTime = 0;
            audio.play();

            batImg.src = 'gf-hit.png';
            myFace.src = 'me-cry.png';
            
            // This translate move her relative to her starting point
            // Move left (-100px) and down (+70px)
            batImg.style.transform = 'translateX(-100px) translateY(70px) rotate(-45deg)';
            myFace.style.transform = 'rotate(20deg) scaleY(0.7) translateY(30px)';

            bonkText.classList.remove('bonk-animate');
            void bonkText.offsetWidth; 
            bonkText.classList.add('bonk-animate');

            setTimeout(() => {
                batImg.src = 'gf-hold.png';
                myFace.src = 'me.png';
                // Reset to her starting transform (translateX(10px))
                batImg.style.transform = 'translateX(10px) translateY(0) rotate(0deg)';
                myFace.style.transform = 'rotate(0deg) scaleY(1) translateY(0)';
            }, 300);
        }
    </script>
</body>
</html>
